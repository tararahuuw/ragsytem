basePath: /api/v1
definitions:
  auth.LoginRequest:
    properties:
      email:
        example: john@example.com
        type: string
      password:
        example: secret123
        type: string
    required:
    - email
    - password
    type: object
  auth.LoginResponse:
    properties:
      token:
        example: dummy-token-1-1700000000
        type: string
      user:
        $ref: '#/definitions/auth.UserResponse'
    type: object
  auth.RegisterRequest:
    properties:
      email:
        example: john@example.com
        type: string
      name:
        example: John Doe
        type: string
      password:
        example: secret123
        minLength: 6
        type: string
    required:
    - email
    - name
    - password
    type: object
  auth.UserResponse:
    properties:
      email:
        example: john@example.com
        type: string
      id:
        example: 1
        type: integer
      name:
        example: John Doe
        type: string
    type: object
  health.HealthResponse:
    properties:
      database:
        example: up
        type: string
      status:
        example: ok
        type: string
    type: object
  response.BaseResponse:
    properties:
      data: {}
      message:
        example: ok
        type: string
      success:
        example: true
        type: boolean
    type: object
  response.ErrorDetail:
    properties:
      code:
        example: VALIDATION_ERROR
        type: string
      details: {}
    type: object
  response.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/response.ErrorDetail'
      message:
        example: something went wrong
        type: string
      success:
        example: false
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    name: RAG System Team
  description: Backend API for the RAG System (NotebookLM-like document Q&A).
  license:
    name: Proprietary
  termsOfService: http://swagger.io/terms/
  title: RAG System API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Validates credentials against the in-memory store and returns a
        dummy token.
      parameters:
      - description: Login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/auth.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Login (dummy)
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a user in the in-memory store. Demo only.
      parameters:
      - description: Registration payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/auth.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Register a new user (dummy)
      tags:
      - auth
  /healthz:
    get:
      description: Returns service and database health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/health.HealthResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/health.HealthResponse'
      summary: Health check
      tags:
      - health
schemes:
- http
- https
swagger: "2.0"
